name: qwry-infra

services:
  valkey:
    image: docker.io/valkey/valkey:8-alpine

    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    profiles: ["searxng"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - searxng-valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - qwry-internal

  searxng:
    image: docker.io/searxng/searxng:${SEARXNG_VERSION:-latest}

    restart: unless-stopped
    profiles: ["searxng"]
    network_mode: host
    depends_on:
      valkey:
        condition: service_healthy
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://127.0.0.1:8080/}
      SEARXNG_SECRET: ${SEARXNG_SECRET:-change-this-before-production}
      UWSGI_WORKERS: ${SEARXNG_WORKERS:-2}
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng-cache:/var/cache/searxng
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://127.0.0.1:8080/healthz || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  qwry-internal:
    driver: bridge

volumes:
  searxng-cache:
  searxng-valkey:
